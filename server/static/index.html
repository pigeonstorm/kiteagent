<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KiteAgent — Windy Point, Lake Travis</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="KiteAgent">
  <link rel="apple-touch-icon" href="/logo.png">
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <style>
    :root { 
      --pico-background-color: #051a2c; 
      --pico-primary: #1a9fb5;
      --pico-primary-background: rgba(26, 159, 181, 0.1);
      --pico-primary-inverse: #051a2c;
      --pico-muted-border-color: rgba(26, 159, 181, 0.2);
    }
    body { max-width: 40rem; margin: 0 auto; padding: 2rem 1rem; }
    h1 { margin-bottom: 0.15rem; display: flex; align-items: center; gap: 0.75rem; }
    h1 img { height: 2.5rem; width: auto; }
    .subtitle { color: var(--pico-muted-color); font-size: 0.875rem; margin-bottom: 2rem; }
    #status { font-size: 0.875rem; }

    /* status rows */
    .info-row {
      display: flex; justify-content: space-between;
      border-bottom: 1px solid var(--pico-muted-border-color);
      padding: 0.35rem 0; font-size: 0.875rem;
    }
    .info-row:last-child { border-bottom: none; }
    .info-row span:last-child { color: var(--pico-muted-color); font-size: 0.8rem; }

    /* next rideable window callout */
    .next-window {
      margin-top: 0.75rem; padding: 0.75rem;
      border-radius: var(--pico-border-radius);
      background: color-mix(in srgb, var(--pico-primary) 10%, transparent);
      border: 1px solid color-mix(in srgb, var(--pico-primary) 30%, transparent);
    }
    .badges { margin-top: 0.4rem; display: flex; gap: 0.3rem; flex-wrap: wrap; }
    .badge {
      font-size: 0.7rem; padding: 0.1rem 0.45rem;
      border-radius: 999px;
      background: var(--pico-primary-background);
      color: var(--pico-primary-inverse);
    }

    /* forecast table */
    #forecast-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
    #forecast-table th {
      text-align: left; padding: 0.3rem 0.4rem;
      border-bottom: 1px solid var(--pico-muted-border-color);
      color: var(--pico-muted-color); font-weight: 600; font-size: 0.72rem;
    }
    #forecast-table td { padding: 0.28rem 0.4rem; }
    #forecast-table tr.day-sep td {
      border-top: 1px solid var(--pico-muted-border-color);
      padding-top: 0.5rem;
    }
    #forecast-table tr.calm td:first-child {
      border-left: 2px solid rgba(148, 163, 184, 0.35);
    }
    #forecast-table tr.windy td:first-child {
      border-left: 2px solid #2db8d4;
    }
    #forecast-table tr.windy {
      background: rgba(45, 184, 212, 0.08);
    }
    #forecast-table tr.rideable td:first-child {
      border-left: 2px solid #0d7a94;
    }
    #forecast-table tr.rideable {
      background: rgba(13, 122, 148, 0.18);
    }
    .wind-val { font-weight: 600; }
    .gust-val { color: var(--pico-muted-color); font-size: 0.75rem; }
    .fetch-meta { color: var(--pico-muted-color); font-size: 0.75rem; margin-bottom: 0.75rem; line-height: 1.4; }

    small.version { display: block; text-align: center; color: var(--pico-muted-color); font-size: 0.7rem; margin-top: 2rem; }
  </style>
</head>
<body>
  <h1><img src="/logo.png" alt="KiteAgent Logo">KiteAgent</h1>
  <p class="subtitle">Windy Point, Lake Travis — Kite Forecast Alerts</p>

  <article>
    <div style="display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap">
      <div>
        <strong>Push Alerts</strong>
        <p style="margin:0.15rem 0 0;color:var(--pico-muted-color);font-size:0.8rem">Get notified when the forecast is good for wind sports</p>
      </div>
      <div style="display:flex;gap:0.5rem;flex-shrink:0">
        <button id="enable" class="contrast" style="white-space:nowrap;padding:0.45rem 1.1rem">Subscribe</button>
        <button id="test-notif" class="outline" style="white-space:nowrap;padding:0.45rem 1.1rem;display:none">Test</button>
      </div>
    </div>
    <p id="status" style="margin:0.6rem 0 0;font-size:0.8rem"></p>
  </article>

  <article>
    <header>
      48-Hour Forecast
      <button id="pull-btn" class="outline" style="float:right;padding:0.2rem 0.7rem;font-size:0.75rem;margin:0;display:none">Pull now</button>
    </header>
    <div id="forecast-info"><span aria-busy="true">Loading…</span></div>
  </article>

  <article>
    <header>Service Status</header>
    <div id="update-info"><span aria-busy="true">Loading…</span></div>
  </article>

  <small class="version">KiteAgent 1.0.0 · Windy Point, Lake Travis</small>

  <script>
    const VAPID_PUBLIC_KEY = '__VAPID_PUBLIC_KEY__';
    const LIVE_ENABLED = __LIVE_ENABLED__;

    async function urlBase64ToUint8Array(base64String) {
      const padding = '='.repeat((4 - base64String.length % 4) % 4);
      const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
      const rawData = window.atob(base64);
      const outputArray = new Uint8Array(rawData.length);
      for (let i = 0; i < rawData.length; ++i) outputArray[i] = rawData.charCodeAt(i);
      return outputArray;
    }

    const btn = document.getElementById('enable');
    const testBtn = document.getElementById('test-notif');
    const statusEl = document.getElementById('status');

    function pushUnsupportedReason() {
      if (location.protocol !== 'https:' && location.hostname !== 'localhost')
        return 'Push notifications require HTTPS. Open this page over a secure connection.';
      if (!('serviceWorker' in navigator))
        return 'Your browser does not support service workers.';
      if (!('PushManager' in window)) {
        const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
        if (isIOS) return 'iOS requires this site to be installed as an app first — tap the Share icon, then "Add to Home Screen", then open KiteAgent from your home screen.';
        return 'Your browser does not support Web Push notifications. Try Chrome or Firefox.';
      }
      return null;
    }

    function markSubscribed() {
      btn.textContent = '✓ Subscribed';
      btn.disabled = true;
      testBtn.style.display = '';
      statusEl.innerHTML = '<small style="color:var(--pico-muted-color)">You will receive alerts when conditions are good.</small>';
    }

    // Show a hint immediately if push won't work in this context.
    const unsupported = pushUnsupportedReason();
    if (unsupported) {
      btn.disabled = true;
      statusEl.innerHTML = `<small style="color:var(--pico-muted-color)">${unsupported}</small>`;
    } else {
      // On iOS, show a proactive install hint even before the user taps.
      const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
      const isStandalone = window.navigator.standalone === true;
      if (isIOS && !isStandalone) {
        statusEl.innerHTML = `<small style="color:var(--pico-muted-color)">📲 On iPhone: tap the Share icon → <strong>Add to Home Screen</strong>, then open KiteAgent from your home screen to enable notifications.</small>`;
        btn.disabled = true;
      }

      // Restore subscribed state if already subscribed.
      navigator.serviceWorker.register('/sw.js').then(async reg => {
        await navigator.serviceWorker.ready;
        const existing = await reg.pushManager.getSubscription();
        if (existing) markSubscribed();
      }).catch(() => {});
    }

    btn.addEventListener('click', async () => {
      const reason = pushUnsupportedReason();
      if (reason) { statusEl.innerHTML = `<mark>${reason}</mark>`; return; }
      btn.setAttribute('aria-busy', 'true');
      btn.disabled = true;
      try {
        const reg = await navigator.serviceWorker.register('/sw.js');
        await navigator.serviceWorker.ready;
        const permission = await Notification.requestPermission();
        if (permission !== 'granted') {
          statusEl.innerHTML = '<mark>Notification permission denied. Enable it in your browser settings.</mark>';
          btn.disabled = false;
          return;
        }
        const sub = await reg.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: await urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
        });
        const res = await fetch('/subscribe', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(sub.toJSON())
        });
        if (!res.ok) throw new Error(`Server error ${res.status}`);
        markSubscribed();
        loadStatus();
      } catch (e) {
        statusEl.innerHTML = `<mark>${e.message}</mark>`;
        console.error(e);
        btn.disabled = false;
      } finally {
        btn.removeAttribute('aria-busy');
      }
    });

    testBtn.addEventListener('click', async () => {
      testBtn.setAttribute('aria-busy', 'true');
      testBtn.disabled = true;
      try {
        const reg = await navigator.serviceWorker.ready;
        const sub = await reg.pushManager.getSubscription();
        if (!sub) {
          statusEl.innerHTML = '<mark>No active subscription found. Try subscribing again.</mark>';
          return;
        }
        const res = await fetch('/test-push', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(sub.toJSON())
        });
        if (!res.ok) throw new Error(`Server error ${res.status}`);
        statusEl.innerHTML = '<small style="color:var(--pico-muted-color)">Test notification sent!</small>';
      } catch (e) {
        statusEl.innerHTML = `<mark>${e.message}</mark>`;
        console.error(e);
      } finally {
        testBtn.removeAttribute('aria-busy');
        testBtn.disabled = false;
      }
    });

    // ── helpers ──────────────────────────────────────────────────────────────

    function reltime(iso) {
      const diff = Date.now() - new Date(iso).getTime();
      const mins = Math.round(diff / 60000);
      if (mins < 2) return 'just now';
      if (mins < 60) return `${mins}m ago`;
      const hrs = Math.round(mins / 60);
      if (hrs < 24) return `${hrs}h ago`;
      return `${Math.round(hrs / 24)}d ago`;
    }

    function bearing(deg) {
      const dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
      return dirs[Math.round(deg / 22.5) % 16];
    }

    function wmoIcon(code) {
      if (code === 0)          return '☀️';
      if (code <= 2)           return '🌤️';
      if (code <= 3)           return '☁️';
      if (code <= 49)          return '🌫️';
      if (code <= 67)          return '🌧️';
      if (code <= 77)          return '❄️';
      if (code <= 82)          return '🌦️';
      if (code <= 86)          return '🌨️';
      return '⛈️';
    }

    function fmtTime(iso) {
      return new Date(iso).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function fmtDay(iso) {
      return new Date(iso).toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric' });
    }

    function infoRow(label, value) {
      return `<div class="info-row"><span>${label}</span><span>${value}</span></div>`;
    }

    // ── /status ───────────────────────────────────────────────────────────────

    async function loadStatus() {
      const el = document.getElementById('update-info');
      try {
        const [statusRes, forecastRes, liveRes] = await Promise.all([
          fetch('/status').then(r => r.json()),
          fetch('/forecast').then(r => r.ok ? r.json() : null).catch(() => null),
          LIVE_ENABLED ? fetch('/live').then(r => r.ok ? r.json() : null).catch(() => null) : Promise.resolve(null),
        ]);
        const d = statusRes;
        let html = '';
        if (forecastRes && !forecastRes.error) {
          html += infoRow('Weather forecast', `${reltime(forecastRes.fetched_at)} · ${forecastRes.source}`);
          html += infoRow('Forecast range', `${fmtDay(forecastRes.valid_from)} – ${fmtDay(forecastRes.valid_to)}`);
        } else if (d.last_forecast_fetch) {
          const f = d.last_forecast_fetch;
          html += infoRow('Forecast', `${reltime(f.at)} ${f.ok ? '✓' : '✗'}`);
        }
        html += infoRow('Live', liveRes?.scraped_at ? `${reltime(liveRes.scraped_at)} · ARL:UT Lake Travis` : '—');
        if (d.last_analysis) {
          const a = d.last_analysis;
          html += infoRow('Last analysis', reltime(a.at));
          html += infoRow('Rideable windows', String(a.windows_found));
          if (a.next_window?.start) {
            const w = a.next_window;
            const disc = (w.disciplines || []).map(d => `<span class="badge">${d}</span>`).join('');
            html += `<div class="next-window">
              <strong>Next window</strong>
              <div>${fmtTime(w.start)} – ${fmtTime(w.end)} · ${Math.round(w.avg_kn ?? 0)} kts · ${bearing(w.dir_deg ?? 0)}</div>
              ${disc ? `<div class="badges">${disc}</div>` : ''}
            </div>`;
          }
        }
        if (d.last_notification_sent) {
          html += infoRow('Last alert', reltime(d.last_notification_sent.at));
        }
        html += infoRow('Subscribers', String(d.subscribers ?? 0));
        if (d.errors_last_24h > 0)
          html += infoRow('Errors (24 h)', `<span style="color:var(--pico-del-color)">${d.errors_last_24h}</span>`);
        el.innerHTML = html || '<span style="color:var(--pico-muted-color)">No data yet</span>';
      } catch {
        el.innerHTML = '<span style="color:var(--pico-muted-color)">Could not load status</span>';
      }
    }

    // ── /live (overlay) ───────────────────────────────────────────────────────

    let liveData = null;
    const MPH_TO_KN = 0.868976;

    async function loadLive() {
      if (!LIVE_ENABLED) return;
      try {
        const r = await fetch('/live');
        if (!r.ok) { liveData = null; return; }
        liveData = await r.json();
      } catch {
        liveData = null;
      }
    }

    // ── /forecast ─────────────────────────────────────────────────────────────

    async function loadForecast() {
      const el = document.getElementById('forecast-info');
      try {
        const d = await fetch('/forecast').then(r => r.json());
        if (d.error) {
          el.innerHTML = `<span style="color:var(--pico-muted-color)">${d.error}</span>`;
          return;
        }

        const now = new Date();
        // Keep only hours from ~1h ago onwards (up to 48h).
        const cutoff = new Date(now.getTime() - 3600_000);
        const hours = (d.hours || []).filter(h => {
          const t = new Date(h.time);
          const hour = t.getHours();
          return t >= cutoff && hour >= 8 && hour <= 20;
        }).slice(0, 48);

        if (!hours.length) {
          el.innerHTML = '<span style="color:var(--pico-muted-color)">No forecast hours available</span>';
          return;
        }

        let rows = '';
        if (liveData) {
          const windKn = (liveData.wind_speed_mph || 0) * MPH_TO_KN;
          const gustKn = (liveData.wind_hi_mph || 0) * MPH_TO_KN;
          const dir = liveData.wind_direction_deg ?? 0;
          rows += `<tr class="rideable day-sep" style="background:color-mix(in srgb, var(--pico-primary) 18%, transparent)">
            <td><strong>Now</strong><br><span style="font-size:0.7rem;color:var(--pico-muted-color)">live</span></td>
            <td><span class="wind-val">${Math.round(windKn)}</span> <span class="gust-val">↑${Math.round(gustKn)}</span> kts</td>
            <td><span style="color:var(--pico-primary)">◉</span></td>
            <td>${bearing(dir)}</td>
            <td>${liveData.temperature_f != null ? Math.round(liveData.temperature_f) + '°F' : '—'}</td>
            <td>◉</td>
            <td></td>
          </tr>`;
        }
        let lastDay = '';
        for (const h of hours) {
          const day = fmtDay(h.time);
          const isSep = day !== lastDay;
          lastDay = day;

          const rideClass = h.rideable ? ' rideable' : (h.wind_kn >= 8 ? ' windy' : ' calm');
          const sepClass = isSep ? ' day-sep' : '';
          rows += `<tr class="${rideClass}${sepClass}">
            <td>${isSep ? `<strong>${day}</strong><br>` : ''}${fmtTime(h.time)}</td>
            <td><span class="wind-val">${Math.round(h.wind_kn)}</span> <span class="gust-val">↑${Math.round(h.gusts_kn)}</span> kts</td>
            <td>—</td>
            <td>${bearing(h.dir_deg)}</td>
            <td>${h.temp_c != null ? Math.round(h.temp_c) + '°C' : '—'}</td>
            <td>${wmoIcon(h.wmo)}</td>
            ${h.rideable ? '<td><img src="/logo.png" style="height:1.2em;vertical-align:left"></td>' : (h.wind_kn >= 8 ? '<td><img src="/logo.png" style="height:1.2em;vertical-align:middle;opacity:0.9"></td>' : '<td></td>')}
          </tr>`;
        }

        const table = `
          <table id="forecast-table">
            <thead><tr>
              <th>Time</th><th>Wind / Gusts</th><th>Live</th><th>Dir</th><th>Temp</th><th>Cond</th><th>Gear</th>
            </tr></thead>
            <tbody>${rows}</tbody>
          </table>`;

        el.innerHTML = table;
      } catch (e) {
        el.innerHTML = '<span style="color:var(--pico-muted-color)">Could not load forecast</span>';
        console.error(e);
      }
    }

    // ── Pull button (admin only) ───────────────────────────────────────────────

    const isAdmin = __IS_ADMIN__;
    const userParam = new URLSearchParams(location.search).get('user') ?? '';
    if (isAdmin) document.getElementById('pull-btn').style.display = '';

    document.getElementById('pull-btn').addEventListener('click', async () => {
      const btn = document.getElementById('pull-btn');
      const el  = document.getElementById('forecast-info');
      btn.setAttribute('aria-busy', 'true');
      btn.disabled = true;
      btn.textContent = 'Pulling…';
      try {
        const pullUrl = userParam ? `/pull?user=${encodeURIComponent(userParam)}` : '/pull';
        const res = await fetch(pullUrl, { method: 'POST' });
        const d = await res.json();
        if (d.ok) {
          await loadForecast();
          await loadStatus();
        } else {
          el.innerHTML = `<mark>Pull failed: ${d.error}</mark>`;
        }
      } catch (e) {
        el.innerHTML = `<mark>${e.message}</mark>`;
      } finally {
        btn.removeAttribute('aria-busy');
        btn.disabled = false;
        btn.textContent = 'Pull now';
      }
    });

    loadStatus();
    (async () => {
      if (LIVE_ENABLED) await loadLive();
      loadForecast();
    })();
    setInterval(loadStatus, 60_000);
    setInterval(async () => {
      if (LIVE_ENABLED) await loadLive();
      loadForecast();
    }, 300_000);
  </script>
</body>
</html>
