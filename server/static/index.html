  <meta name="mobile-web-app-capable" content="yes">

  <link rel="apple-touch-icon" href="/logo-180.png" sizes="180x180">
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <style>
    :root { 
      --pico-background-color: #051a2c; 
      --pico-primary: #1a9fb5;
      --pico-primary-background: rgba(26, 159, 181, 0.1);
      --pico-primary-inverse: #051a2c;
      --pico-muted-border-color: rgba(26, 159, 181, 0.2);
      --pico-block-spacing: 0.75rem;
    }
    body { max-width: 40rem; margin: 0 auto; padding: 1rem 0.75rem; }
    h1 { margin-bottom: 0.05rem; display: flex; align-items: center; gap: 0.5rem; }
    h1 img { height: 1.5rem; width: auto; }
    .subtitle { color: var(--pico-muted-color); font-size: 0.875rem; margin-bottom: 1rem; }
    #status { font-size: 0.875rem; }

    /* status rows */
    .info-row {
      display: flex; justify-content: space-between;
      border-bottom: 1px solid var(--pico-muted-border-color);
      padding: 0.1rem 0; font-size: 0.875rem;
    }
    .info-row:last-child { border-bottom: none; }
    .info-row span:last-child { color: var(--pico-muted-color); font-size: 0.8rem; }

    /* next rideable window callout */
    .next-window {
      margin-top: 0.5rem; padding: 0.5rem;
      border-radius: var(--pico-border-radius);
      background: color-mix(in srgb, var(--pico-primary) 10%, transparent);
      border: 1px solid color-mix(in srgb, var(--pico-primary) 30%, transparent);
    }
    .badges { margin-top: 0.4rem; display: flex; gap: 0.3rem; flex-wrap: wrap; }
    .badge {
      font-size: 0.7rem; padding: 0.1rem 0.45rem;
      border-radius: 999px;
      background: var(--pico-primary-background);
      color: var(--pico-primary-inverse);
    }

    /* forecast table */
    #forecast-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
    #forecast-table th {
      text-align: left; padding: 0.2rem 0.35rem;
      border-bottom: 1px solid var(--pico-muted-border-color);
      color: var(--pico-muted-color); font-weight: 600; font-size: 0.72rem;
    }
    #forecast-table td { padding: 0.2rem 0.35rem; }
    #forecast-table th:nth-child(2),
    #forecast-table td:nth-child(2) {
      width: 92px;
      max-width: 92px;
      box-sizing: border-box;
      padding-inline: 0.25rem 0.05rem;
    }
    #forecast-table th.forecast-col-ratio,
    #forecast-table td.forecast-ratio-cell {
      width: 72px;
      max-width: 72px;
      padding-inline: 0.05rem 0.12rem;
      text-align: center;
      box-sizing: border-box;
    }
    #forecast-table th.forecast-col-ratio {
      font-size: 0.62rem;
      line-height: 1.15;
      white-space: normal;
      overflow-wrap: anywhere;
    }
    #forecast-table td.forecast-ratio-cell {
      font-size: 0.8rem;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }
    #forecast-table tr.forecast-day-row td {
      border-top: 1px solid var(--pico-muted-border-color);
      padding: 0.45rem 0.35rem 0.2rem;
      text-align: left;
      vertical-align: bottom;
      color: var(--pico-muted-color);
      font-size: 0.72rem;
    }
    #forecast-table tbody > tr.forecast-day-row:first-child td {
      border-top: none;
      padding-top: 0.15rem;
    }
    #forecast-table tr.forecast-day-row strong {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--pico-color);
    }
    #forecast-table tr.forecast-live-row td {
      border-bottom: 1px solid var(--pico-muted-border-color);
      padding-bottom: 0.4rem;
    }
    /* Left accent: base hue from row class; brightness mixes white by gust/avg ratio */
    #forecast-table tr.forecast-row td:first-child {
      border-left: 1px solid color-mix(in srgb, var(--row-accent-base), white var(--gust-bright, 0%));
    }
    #forecast-table tr.windy {
      background: rgba(45, 184, 212, 0.08);
    }
    #forecast-table tr.rideable {
      background: rgba(13, 122, 148, 0.18);
    }
    .wind-val { font-weight: 600; }
    .gust-val { color: var(--pico-muted-color); font-size: 0.75rem; }
    .fetch-meta { color: var(--pico-muted-color); font-size: 0.75rem; margin-bottom: 0.5rem; line-height: 1.4; }

    /* forecast & status articles: reduce gap between header and content */
    article:has(#forecast-info) header,
    article:has(#update-info) header { margin-bottom: 0.25rem; }
    #forecast-info, #update-info { margin-top: 0; margin-bottom: 0; }
    #forecast-info table { margin-top: 0; margin-bottom: 0; }
    article:has(#forecast-info) { padding-bottom: 0.25rem; }

    .version-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.75rem;
      margin-top: 1rem;
      font-size: 0.7rem;
    }
    .version-row .version {
      margin: 0;
      color: var(--pico-muted-color);
      text-align: left;
    }
    .version-row .doc-link {
      flex-shrink: 0;
      color: var(--pico-primary);
      text-decoration: none;
    }
    .version-row .doc-link:hover {
      text-decoration: underline;
    }

    /* rider weight input */
    .weight-row {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.8rem;
      color: var(--pico-muted-color);
      margin-bottom: 0.75rem;
    }
    .weight-row input[type="number"] {
      width: 4rem;
      padding: 0.15rem 0.3rem;
      font-size: 0.8rem;
      border: 1px solid var(--pico-muted-border-color);
      border-radius: var(--pico-border-radius);
      background: transparent;
      color: inherit;
      margin: 0;
    }
    .weight-row .weight-edit-btn {
      background: none;
      border: none;
      color: var(--pico-primary);
      cursor: pointer;
      padding: 0;
      font-size: 0.8rem;
      line-height: 1;
    }

    /* gear cell in forecast table */
    .gear-cell { white-space: nowrap; font-size: 0.72rem; }
    .gear-cell img { height: 1em; vertical-align: middle; opacity: 0.85; margin-right: 0.05rem; }
  </style>
</head>
<body>
  <h1><img src="/logo.png" alt="KiteAgent Logo" title="KiteAgent">KiteAgent</h1>
  <p class="subtitle">Windy Point, Lake Travis — Kite Forecast Alerts</p>

  <div class="weight-row" id="weight-row" style="display:none">
    <span>Rider:</span>
    <span id="weight-label" style="cursor:pointer"></span>
    <input id="weight-input" type="number" min="30" max="180" step="1" style="display:none" placeholder="kg">
    <button class="weight-edit-btn" id="weight-edit" title="Edit weight">&#9998;</button>
    <button class="weight-edit-btn" id="weight-clear" title="Reset weight to 80 kg" style="display:none">&times;</button>
  </div>

  <article id="push-alerts">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap">
      <div>
        <strong>Push Alerts</strong>
        <p style="margin:0.15rem 0 0;color:var(--pico-muted-color);font-size:0.8rem">Get notified when the forecast is good for wind sports</p>
      </div>
      <div style="display:flex;gap:0.5rem;flex-shrink:0">
        <button id="enable" class="contrast" style="white-space:nowrap;padding:0.45rem 1.1rem">Subscribe</button>
        <button id="test-notif" class="outline" style="white-space:nowrap;padding:0.45rem 1.1rem;display:none">Test</button>
      </div>
    </div>
    <p id="status" style="margin:0.4rem 0 0;font-size:0.8rem"></p>
  </article>

  <article>
    <header>
      48-Hour Forecast
      <button id="pull-btn" class="outline" style="float:right;padding:0.2rem 0.7rem;font-size:0.75rem;margin:0;display:none">Pull now</button>
    </header>
    <div id="forecast-info"><span aria-busy="true">Loading…</span></div>
  </article>

  <article>
    <header>Service Status</header>
    <div id="update-info"><span aria-busy="true">Loading…</span></div>
  </article>

  <div id="subscribed-actions" style="display:none;margin-top:1rem;padding-top:0.75rem;border-top:1px solid var(--pico-muted-border-color);gap:0.5rem;justify-content:center;flex-wrap:wrap;align-items:center">
    <button id="subscribed-test" class="outline" style="font-size:0.8rem">Test notification</button>
    <button id="subscribed-unsubscribe" class="secondary outline" style="font-size:0.8rem">Unsubscribe</button>
  </div>

  <div class="version-row">
    <small class="version">KiteAgent 1.0.1 · Windy Point, Lake Travis</small>
    <a class="doc-link" href="/doc">/doc</a>
  </div>

  <script>
    const VAPID_PUBLIC_KEY = '__VAPID_PUBLIC_KEY__';
    const LIVE_ENABLED = __LIVE_ENABLED__;

    // ── Rider weight (localStorage, default 80 kg) ───────────────────────────

    const DEFAULT_RIDER_WEIGHT_KG = '80';
    let kitegear = null;
    let riderWeight = localStorage.getItem('rider_weight_kg');
    if (riderWeight === null || riderWeight === '') {
      riderWeight = DEFAULT_RIDER_WEIGHT_KG;
      localStorage.setItem('rider_weight_kg', riderWeight);
    }

    const weightRow = document.getElementById('weight-row');
    const weightLabel = document.getElementById('weight-label');
    const weightInput = document.getElementById('weight-input');
    const weightEditBtn = document.getElementById('weight-edit');
    const weightClearBtn = document.getElementById('weight-clear');

    function showWeightDisplay() {
      if (riderWeight) {
        weightLabel.textContent = riderWeight + ' kg';
        weightLabel.style.display = '';
        weightInput.style.display = 'none';
        weightEditBtn.textContent = '\u270E';
        weightClearBtn.style.display = riderWeight !== DEFAULT_RIDER_WEIGHT_KG ? '' : 'none';
      } else {
        weightLabel.style.display = 'none';
        weightInput.style.display = '';
        weightInput.value = '';
        weightInput.focus();
        weightEditBtn.textContent = '\u270E';
        weightClearBtn.style.display = 'none';
      }
      weightRow.style.display = 'flex';
    }

    function commitWeight(val) {
      const n = parseInt(val, 10);
      if (n >= 30 && n <= 180) {
        riderWeight = String(n);
        localStorage.setItem('rider_weight_kg', riderWeight);
        showWeightDisplay();
        loadKitegearAndRefresh();
      } else if (!val || val === '') {
        clearWeight();
      }
    }

    function clearWeight() {
      riderWeight = DEFAULT_RIDER_WEIGHT_KG;
      localStorage.setItem('rider_weight_kg', riderWeight);
      showWeightDisplay();
      loadKitegearAndRefresh();
    }

    weightEditBtn.addEventListener('click', () => {
      if (weightInput.style.display === 'none') {
        weightLabel.style.display = 'none';
        weightInput.style.display = '';
        weightInput.value = riderWeight || '';
        weightClearBtn.style.display = (riderWeight && riderWeight !== DEFAULT_RIDER_WEIGHT_KG) ? '' : 'none';
        weightInput.focus();
      } else {
        commitWeight(weightInput.value);
      }
    });

    weightClearBtn.addEventListener('click', clearWeight);

    weightInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') commitWeight(weightInput.value);
    });
    weightInput.addEventListener('blur', () => {
      if (weightInput.value) commitWeight(weightInput.value);
      else if (riderWeight) showWeightDisplay();
    });

    weightLabel.addEventListener('click', () => {
      weightLabel.style.display = 'none';
      weightInput.style.display = '';
      weightInput.value = riderWeight || '';
      weightInput.focus();
    });

    async function loadKitegearAndRefresh() {
      if (!riderWeight) return;
      if (!kitegear) {
        try {
          const mod = await import('/kite-gear.js');
          await mod.default({ module_or_path: '/kite-gear.wasm' });
          kitegear = mod;
        } catch (e) {
          console.warn('kitegear WASM not available:', e);
          return;
        }
      }
      loadForecast();
    }

    showWeightDisplay();
    loadKitegearAndRefresh();

    function gearCell(windKn) {
      if (!kitegear || !riderWeight) return '<td></td>';
      const w = parseFloat(riderWeight);
      const kite = kitegear.kite_size(windKn, w);
      const wing = kitegear.wing_size(windKn, w);
      const parts = [];
      if (kite > 0) {
        parts.push(`<img src="/kite-icon.png" alt="Kite" width="16" height="16" decoding="async"> ${kite}`);
      }
      if (wing > 0) {
        parts.push(`<img src="/wing-icon.svg" alt="Wing" width="16" height="16" decoding="async"> ${wing}`);
      }
      return `<td class="gear-cell">${parts.join(' ')}</td>`;
    }

    async function urlBase64ToUint8Array(base64String) {
      const padding = '='.repeat((4 - base64String.length % 4) % 4);
      const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
      const rawData = window.atob(base64);
      const outputArray = new Uint8Array(rawData.length);
      for (let i = 0; i < rawData.length; ++i) outputArray[i] = rawData.charCodeAt(i);
      return outputArray;
    }

    const btn = document.getElementById('enable');
    const testBtn = document.getElementById('test-notif');
    const statusEl = document.getElementById('status');

    function pushUnsupportedReason() {
      if (location.protocol !== 'https:' && location.hostname !== 'localhost')
        return 'Push notifications require HTTPS. Open this page over a secure connection.';
      if (!('serviceWorker' in navigator))
        return 'Your browser does not support service workers.';
      if (!('PushManager' in window)) {
        const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
        if (isIOS) return 'iOS requires this site to be installed as an app first — tap the Share icon, then "Add to Home Screen", then open KiteAgent from your home screen.';
        return 'Your browser does not support Web Push notifications. Try Chrome or Firefox.';
      }
      return null;
    }

    const subscribedActions = document.getElementById('subscribed-actions');
    const subscribedTestBtn = document.getElementById('subscribed-test');
    const subscribedUnsubBtn = document.getElementById('subscribed-unsubscribe');

    function markSubscribed() {
      document.getElementById('push-alerts').style.display = 'none';
      subscribedActions.style.display = 'flex';
    }

    function markUnsubscribed() {
      document.getElementById('push-alerts').style.display = '';
      subscribedActions.style.display = 'none';
      btn.textContent = 'Subscribe';
      btn.disabled = false;
      testBtn.style.display = 'none';
      statusEl.innerHTML = '';
    }

    // Show a hint immediately if push won't work in this context.
    const unsupported = pushUnsupportedReason();
    if (unsupported) {
      btn.disabled = true;
      statusEl.innerHTML = `<small style="color:var(--pico-muted-color)">${unsupported}</small>`;
    } else {
      // On iOS, show a proactive install hint even before the user taps.
      const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
      const isStandalone = window.navigator.standalone === true;
      if (isIOS && !isStandalone) {
        statusEl.innerHTML = `<small style="color:var(--pico-muted-color)">📲 On iPhone: tap the Share icon → <strong>Add to Home Screen</strong>, then open KiteAgent from your home screen to enable notifications.</small>`;
        btn.disabled = true;
      }

      // Restore subscribed state if already subscribed.
      navigator.serviceWorker.register('/sw.js').then(async reg => {
        await navigator.serviceWorker.ready;
        const existing = await reg.pushManager.getSubscription();
        if (existing) markSubscribed();
      }).catch(() => {});
    }

    btn.addEventListener('click', async () => {
      const reason = pushUnsupportedReason();
      if (reason) { statusEl.innerHTML = `<mark>${reason}</mark>`; return; }
      btn.setAttribute('aria-busy', 'true');
      btn.disabled = true;
      try {
        const reg = await navigator.serviceWorker.register('/sw.js');
        await navigator.serviceWorker.ready;
        const permission = await Notification.requestPermission();
        if (permission !== 'granted') {
          statusEl.innerHTML = '<mark>Notification permission denied. Enable it in your browser settings.</mark>';
          btn.disabled = false;
          return;
        }
        const sub = await reg.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: await urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
        });
        const res = await fetch('/subscribe', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(sub.toJSON())
        });
        if (!res.ok) throw new Error(`Server error ${res.status}`);
        markSubscribed();
        loadStatus();
      } catch (e) {
        statusEl.innerHTML = `<mark>${e.message}</mark>`;
        console.error(e);
        btn.disabled = false;
      } finally {
        btn.removeAttribute('aria-busy');
      }
    });

    async function sendTestNotification() {
      const reg = await navigator.serviceWorker.ready;
      const sub = await reg.pushManager.getSubscription();
      if (!sub) return false;
      const res = await fetch('/test-push', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(sub.toJSON())
      });
      return res.ok;
    }

    testBtn.addEventListener('click', async () => {
      testBtn.setAttribute('aria-busy', 'true');
      testBtn.disabled = true;
      try {
        const ok = await sendTestNotification();
        statusEl.innerHTML = ok ? '<small style="color:var(--pico-muted-color)">Test notification sent!</small>' : '<mark>No active subscription found. Try subscribing again.</mark>';
      } catch (e) {
        statusEl.innerHTML = `<mark>${e.message}</mark>`;
        console.error(e);
      } finally {
        testBtn.removeAttribute('aria-busy');
        testBtn.disabled = false;
      }
    });

    subscribedTestBtn.addEventListener('click', async () => {
      subscribedTestBtn.setAttribute('aria-busy', 'true');
      subscribedTestBtn.disabled = true;
      try {
        const ok = await sendTestNotification();
        if (ok) subscribedTestBtn.textContent = 'Sent!';
        setTimeout(() => { subscribedTestBtn.textContent = 'Test notification'; }, 2000);
      } catch (e) {
        console.error(e);
      } finally {
        subscribedTestBtn.removeAttribute('aria-busy');
        subscribedTestBtn.disabled = false;
      }
    });

    subscribedUnsubBtn.addEventListener('click', async () => {
      subscribedUnsubBtn.setAttribute('aria-busy', 'true');
      subscribedUnsubBtn.disabled = true;
      try {
        const reg = await navigator.serviceWorker.ready;
        const sub = await reg.pushManager.getSubscription();
        if (sub) {
          await fetch('/unsubscribe', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(sub.toJSON())
          });
          await sub.unsubscribe();
        }
        markUnsubscribed();
        loadStatus();
      } catch (e) {
        console.error(e);
      } finally {
        subscribedUnsubBtn.removeAttribute('aria-busy');
        subscribedUnsubBtn.disabled = false;
      }
    });

    // ── helpers ──────────────────────────────────────────────────────────────

    function reltime(iso) {
      const diff = Date.now() - new Date(iso).getTime();
      const mins = Math.round(diff / 60000);
      if (mins < 2) return 'just now';
      if (mins < 60) return `${mins}m ago`;
      const hrs = Math.round(mins / 60);
      if (hrs < 24) return `${hrs}h ago`;
      return `${Math.round(hrs / 24)}d ago`;
    }

    function bearing(deg) {
      const dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
      return dirs[Math.round(deg / 22.5) % 16];
    }

    function wmoIcon(code) {
      if (code === 0)          return '☀️';
      if (code <= 2)           return '🌤️';
      if (code <= 3)           return '☁️';
      if (code <= 49)          return '🌫️';
      if (code <= 67)          return '🌧️';
      if (code <= 77)          return '❄️';
      if (code <= 82)          return '🌦️';
      if (code <= 86)          return '🌨️';
      return '⛈️';
    }

    function fmtTime(iso) {
      return new Date(iso).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function fmtDay(iso) {
      return new Date(iso).toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric' });
    }

    /** Spot timezone (matches agent / Open-Meteo request). HRRR JSON uses UTC wall times without a Z suffix. */
    const SPOT_TZ = 'America/Chicago';

    function parseForecastInstant(iso) {
      if (!iso) return new Date(NaN);
      const s = String(iso).trim();
      if (/[zZ]$/.test(s) || /[+-]\d{2}:?\d{2}$/.test(s)) return new Date(s);
      return new Date(s + 'Z');
    }

    function hourInSpot(iso) {
      const d = parseForecastInstant(iso);
      const parts = new Intl.DateTimeFormat('en-US', {
        timeZone: SPOT_TZ,
        hour: 'numeric',
        hour12: false,
      }).formatToParts(d);
      const h = parts.find((p) => p.type === 'hour');
      return h ? parseInt(h.value, 10) : NaN;
    }

    function fmtTimeSpot(iso) {
      return parseForecastInstant(iso).toLocaleTimeString([], {
        timeZone: SPOT_TZ,
        hour: '2-digit',
        minute: '2-digit',
      });
    }

    function fmtDaySpot(iso) {
      return parseForecastInstant(iso).toLocaleDateString([], {
        timeZone: SPOT_TZ,
        weekday: 'short',
        month: 'short',
        day: 'numeric',
      });
    }

    /**
     * Wind/gust column: gust ÷ wind, one decimal (e.g. 1.5).
     * --gust-bright whitens the left border more when gusts are punchy (scale up to 2.25:1).
     */
    function gustAccent(gustKn, windKn) {
      const minWind = 0.75;
      if (windKn < minWind) return { windGustRatioLabel: '—', bright: '0%' };
      const ratio = gustKn / windKn;
      if (!Number.isFinite(ratio) || ratio > 8) return { windGustRatioLabel: '—', bright: '0%' };
      const windGustRatioLabel = ratio.toFixed(1);
      const clamped = Math.min(2.25, Math.max(1, ratio));
      const t = (clamped - 1) / 1.25;
      return { windGustRatioLabel, bright: `${Math.round(t * 58)}%` };
    }

    function forecastRowAttrs(accentClass, gustKn, windKn) {
      const { windGustRatioLabel, bright } = gustAccent(gustKn, windKn);
      const bases = { calm: '#64748b', windy: '#2db8d4', rideable: '#0d7a94' };
      const base = bases[accentClass] || bases.calm;
      return {
        windGustRatioLabel,
        trStyle: `--row-accent-base:${base};--gust-bright:${bright};`,
      };
    }

    function infoRow(label, value) {
      return `<div class="info-row"><span>${label}</span><span>${value}</span></div>`;
    }

    // ── /status ───────────────────────────────────────────────────────────────

    async function loadStatus() {
      const el = document.getElementById('update-info');
      try {
        const [statusRes, forecastRes, liveRes] = await Promise.all([
          fetch('/status').then(r => r.json()),
          fetch('/forecast').then(r => r.ok ? r.json() : null).catch(() => null),
          LIVE_ENABLED ? fetch('/live', { cache: 'no-store' }).then(r => r.ok ? r.json() : null).catch(() => null) : Promise.resolve(null),
        ]);
        const d = statusRes;
        let html = '';
        if (forecastRes && !forecastRes.error) {
          html += infoRow('Weather forecast', `${reltime(forecastRes.fetched_at)} · ${forecastRes.source}`);
          html += infoRow('Forecast range', `${fmtDay(forecastRes.valid_from)} – ${fmtDay(forecastRes.valid_to)}`);
        } else if (d.last_forecast_fetch) {
          const f = d.last_forecast_fetch;
          html += infoRow('Forecast', `${reltime(f.at)} ${f.ok ? '✓' : '✗'}`);
        }
        const stationUrl = 'https://wwwext.arlut.utexas.edu/weather/lake/';
        html += infoRow('Live', liveRes?.scraped_at ? `${reltime(liveRes.scraped_at)} - <a href="${stationUrl}" rel="noopener noreferrer" target="_blank" style="color:var(--pico-primary)">ARL:UT Lake Travis</a>` : '—');
        if (d.last_analysis) {
          const a = d.last_analysis;
          html += infoRow('Last analysis', reltime(a.at));
          html += infoRow('Rideable windows', String(a.windows_found));
          if (a.next_window?.start) {
            const w = a.next_window;
            const disc = (w.disciplines || []).map(d => `<span class="badge">${d}</span>`).join('');
            html += `<div class="next-window">
              <strong>Next window</strong>
              <div>${fmtTime(w.start)} – ${fmtTime(w.end)} · ${Math.round(w.avg_kn ?? 0)} kts · ${bearing(w.dir_deg ?? 0)}</div>
              ${disc ? `<div class="badges">${disc}</div>` : ''}
            </div>`;
          }
        }
        if (d.last_notification_sent) {
          html += infoRow('Last alert', reltime(d.last_notification_sent.at));
        }
        html += infoRow('Subscribers', String(d.subscribers ?? 0));
        if (d.errors_last_24h > 0)
          html += infoRow('Errors (24 h)', `<span style="color:var(--pico-del-color)">${d.errors_last_24h}</span>`);
        el.innerHTML = html || '<span style="color:var(--pico-muted-color)">No data yet</span>';
      } catch {
        el.innerHTML = '<span style="color:var(--pico-muted-color)">Could not load status</span>';
      }
    }

    // ── /live (overlay) ───────────────────────────────────────────────────────

    let liveData = null;

    async function loadLive() {
      if (!LIVE_ENABLED) return;
      try {
        const r = await fetch('/live', { cache: 'no-store' });
        if (!r.ok) { liveData = null; return; }
        liveData = await r.json();
      } catch {
        liveData = null;
      }
    }

    // ── /forecast ─────────────────────────────────────────────────────────────

    async function loadForecast() {
      const el = document.getElementById('forecast-info');
      try {
        const d = await fetch('/forecast').then(r => r.json());
        if (d.error) {
          el.innerHTML = `<span style="color:var(--pico-muted-color)">${d.error}</span>`;
          return;
        }

        const now = new Date();
        const cutoff = new Date(now.getTime() - 3600_000);
        const all = d.hours || [];
        const future = all.filter((h) => parseForecastInstant(h.time) >= cutoff);
        // Daylight at the spot (not browser local): HRRR times are UTC; filter uses America/Chicago.
        const hours = future
          .filter((h) => {
            const hc = hourInSpot(h.time);
            return hc >= 8 && hc <= 20;
          })
          .slice(0, 48);

        if (!hours.length) {
          let msg = 'No forecast hours available';
          if (!all.length) msg = 'No forecast hours in response';
          else if (!future.length)
            msg =
              'Forecast is stale (all hours are in the past). Use Pull now (with ?user=…) or wait for the agent to fetch.';
          else
            msg =
              'No 8am–8pm Central slots in the next window (try again later or use Pull now).';
          el.innerHTML = `<span style="color:var(--pico-muted-color)">${msg}</span>`;
          return;
        }

        let rows = '';
        if (liveData) {
          const windKn = liveData.wind_speed_kn ?? 0;
          const gustKn = liveData.wind_hi_kn ?? 0;
          const dir = liveData.wind_direction_deg ?? 0;
          const liveStripe = forecastRowAttrs('rideable', gustKn, windKn);
          rows += `<tr class="forecast-row rideable forecast-live-row" style="background:color-mix(in srgb, var(--pico-primary) 18%, transparent);${liveStripe.trStyle}">
            <td><strong>Now</strong><br><span style="font-size:0.7rem;color:var(--pico-muted-color)">live</span></td>
            <td><span class="wind-val">${Math.round(windKn)}</span> <span class="gust-val">↑${Math.round(gustKn)}</span> kts</td>
            <td class="forecast-ratio-cell">${liveStripe.windGustRatioLabel}</td>
            <td>${bearing(dir)}</td>
            <td>${liveData.temperature_f != null ? Math.round(liveData.temperature_f) + '°F' : '—'}</td>
            <td>◉</td>
            ${gearCell(windKn)}
          </tr>`;
        }
        let lastDay = '';
        for (const h of hours) {
          const day = fmtDaySpot(h.time);
          const isSep = day !== lastDay;
          lastDay = day;

          const rideClass = h.rideable ? 'rideable' : (h.wind_kn >= 8 ? 'windy' : 'calm');
          const stripe = forecastRowAttrs(rideClass, h.gusts_kn, h.wind_kn);
          if (isSep) {
            rows += `<tr class="forecast-day-row"><td colspan="7"><strong>${day}</strong></td></tr>`;
          }
          rows += `<tr class="forecast-row ${rideClass}" style="${stripe.trStyle}">
            <td>${fmtTimeSpot(h.time)}</td>
            <td><span class="wind-val">${Math.round(h.wind_kn)}</span> <span class="gust-val">↑${Math.round(h.gusts_kn)}</span> kts</td>
            <td class="forecast-ratio-cell">${stripe.windGustRatioLabel}</td>
            <td>${bearing(h.dir_deg)}</td>
            <td>${h.temp_c != null ? Math.round(h.temp_c) + '°C' : '—'}</td>
            <td>${wmoIcon(h.wmo)}</td>
            ${gearCell(h.wind_kn)}
          </tr>`;
        }

        const table = `
          <table id="forecast-table">
            <thead><tr>
              <th>Time</th><th>Wind / Gusts</th><th class="forecast-col-ratio">Wind/Gust</th><th>Dir</th><th>Temp</th><th>Cond</th><th>Gear</th>
            </tr></thead>
            <tbody>${rows}</tbody>
          </table>`;

        el.innerHTML = table;
      } catch (e) {
        el.innerHTML = '<span style="color:var(--pico-muted-color)">Could not load forecast</span>';
        console.error(e);
      }
    }

    // ── Pull button (admin only) ───────────────────────────────────────────────

    const isAdmin = __IS_ADMIN__;
    const userParam = new URLSearchParams(location.search).get('user') ?? '';
    if (isAdmin) document.getElementById('pull-btn').style.display = '';

    document.getElementById('pull-btn').addEventListener('click', async () => {
      const btn = document.getElementById('pull-btn');
      const el  = document.getElementById('forecast-info');
      btn.setAttribute('aria-busy', 'true');
      btn.disabled = true;
      btn.textContent = 'Pulling…';
      try {
        const pullUrl = userParam ? `/pull?user=${encodeURIComponent(userParam)}` : '/pull';
        const res = await fetch(pullUrl, { method: 'POST' });
        const d = await res.json();
        if (d.ok) {
          await loadForecast();
          await loadStatus();
        } else {
          el.innerHTML = `<mark>Pull failed: ${d.error}</mark>`;
        }
      } catch (e) {
        el.innerHTML = `<mark>${e.message}</mark>`;
      } finally {
        btn.removeAttribute('aria-busy');
        btn.disabled = false;
        btn.textContent = 'Pull now';
      }
    });

    loadStatus();
    (async () => {
      if (LIVE_ENABLED) await loadLive();
      loadForecast();
    })();
    setInterval(loadStatus, 60_000);
    setInterval(async () => {
      if (LIVE_ENABLED) await loadLive();
      loadForecast();
    }, 300_000);
  </script>
</body>
</html>
